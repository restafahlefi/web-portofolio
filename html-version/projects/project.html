<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Detail proyek pengembangan aplikasi web dan mobile oleh Mochamad Resta Fahlefi, Fullstack Software Engineer.">
    <meta name="author" content="Mochamad Resta Fahlefi">
    <title>Project Detail | Resta Fahlefi - Software Engineer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/project-detail.css">
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
</head>
<body>
    <!-- Preloader -->
    <div class="preloader" id="preloader">
        <div class="preloader__spinner"></div>
        <div class="preloader__content">
            <div id="terminal-loader" class="terminal-loader"></div>
        </div>
    </div>

    <!-- Custom Cursor -->
    <div class="custom-cursor" id="custom-cursor"></div>
    <div class="custom-cursor-follower" id="custom-cursor-follower"></div>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress" id="scroll-progress"></div>



    <main class="project-detail">
        <!-- Hero Banner -->
        <section class="pd-hero">
            <div class="container">
                <span class="pd-hero__tag" id="pd-category">Web App</span>
                <h1 class="pd-hero__title" id="pd-title">Loading...</h1>
                <p class="pd-hero__subtitle" id="pd-subtitle"></p>
            </div>
        </section>

        <!-- Project Image -->
        <section class="pd-image-section">
            <div class="container">
                <div class="pd-image-wrapper">
                    <img id="pd-image" src="" alt="Project screenshot" class="pd-image">
                </div>
            </div>
        </section>

        <!-- Project Info Grid -->
        <section class="pd-info">
            <div class="container">
                <div class="pd-grid">
                    <!-- Left: Description -->
                    <div class="pd-main">
                        <div class="pd-section">
                            <h2 class="pd-section__title">Tentang Proyek</h2>
                            <div id="pd-description" class="pd-section__text"></div>
                        </div>
                        <div class="pd-section">
                            <h2 class="pd-section__title">Fitur Utama</h2>
                            <ul id="pd-features" class="pd-features"></ul>
                        </div>
                    </div>
                    <!-- Right: Sidebar -->
                    <aside class="pd-sidebar">
                        <div class="pd-sidebar__card">
                            <h3 class="pd-sidebar__title">Tech Stack</h3>
                            <div id="pd-tech" class="pd-sidebar__tags"></div>
                        </div>
                        <div class="pd-sidebar__card">
                            <h3 class="pd-sidebar__title">Kategori</h3>
                            <p id="pd-type" class="pd-sidebar__value"></p>
                        </div>
                        <div class="pd-sidebar__card">
                            <h3 class="pd-sidebar__title">Tahun</h3>
                            <p id="pd-year" class="pd-sidebar__value"></p>
                        </div>
                        <div class="pd-sidebar__card">
                            <h3 class="pd-sidebar__title">Status</h3>
                            <p id="pd-status" class="pd-sidebar__value"></p>
                        </div>
                    </aside>
                </div>
            </div>
        </section>

        <!-- Screenshots Gallery -->
        <section class="pd-gallery">
            <div class="container">
                <h2 class="pd-section__title">Screenshot Halaman</h2>
                <div id="pd-screenshots" class="pd-gallery__grid"></div>
            </div>
        </section>

        <!-- Pages List -->
        <section class="pd-pages">
            <div class="container">
                <h2 class="pd-section__title">Halaman dalam Proyek</h2>
                <div id="pd-pages-list" class="pd-pages__grid"></div>
            </div>
        </section>

        <!-- Back Button -->
        <section class="pd-back">
            <div class="container" style="text-align:center;">
                <a href="../index.html#projects" class="btn btn--primary">← Kembali ke Portfolio</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__container container">
            <div class="footer__bottom">
                <p>&copy; 2026 Mochamad Resta Fahlefi. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Back to Top Button -->
    <div class="back-to-top" id="back-to-top" aria-label="Kembali ke atas">
        ↑
    </div>

    <script src="../js/project-data.js"></script>
    <script src="../js/project-detail.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
